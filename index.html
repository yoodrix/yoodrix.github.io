<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoodrix — Showcasing sites from small devs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f6e9df;
    --grid-line: rgba(60,50,45,0.07);
    --ink: #2c2622;
    --card-shadow: rgba(44,38,34,0.35);
    --icon-bg: #fbf4ea;
    --sponsor-purple: #a89aab;
    --card-pink: #fc6c86;
    --card-teal: #4fd6c4;
    --card-cream: #f3e6d6;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--ink);
    font-family: 'Space Mono', 'Courier New', monospace;
  }

  .page{
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .brand{
    text-align:center;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 0 0 28px;
  }

  .tagline{
    text-align:center;
    font-size: 1.15rem;
    line-height: 1.6;
    margin: 0 0 8px;
  }

  .lineup-label{
    text-align:center;
    font-size: 1.15rem;
    margin: 0 0 36px;
  }

  .card{
    border-radius: 22px;
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--card-shadow);
    padding: 32px 26px;
    margin-bottom: 44px;
    background: var(--card-cream);
  }

  .card.sponsor{ background: var(--sponsor-purple); }
  .card.pink{ background: var(--card-pink); }
  .card.teal{ background: var(--card-teal); }

  .card h2{
    text-align:center;
    font-size: 1.5rem;
    margin: 0 0 6px;
    letter-spacing: 1px;
  }

  .sponsored-tag{
    text-align:center;
    font-size: 0.95rem;
    opacity: 0.8;
    margin: 0 0 18px;
    font-style: italic;
  }

  .card p{
    font-size: 0.98rem;
    line-height: 1.65;
    text-align:center;
    margin: 0 0 22px;
  }

  .card .lead{ font-weight: 700; }

  .icon-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width: 56px;
    height: 56px;
    margin: 0 auto;
    background: var(--icon-bg);
    border: 3px solid var(--ink);
    border-radius: 14px;
    box-shadow: 5px 5px 0 var(--card-shadow);
    text-decoration:none;
    color: var(--ink);
    transition: transform 0.15s ease;
  }
  .icon-btn:hover{ transform: translate(-2px,-2px); }
  .icon-btn:active{ transform: translate(1px,1px); box-shadow: 3px 3px 0 var(--card-shadow); }

  .icon-btn svg{ width: 26px; height: 26px; }

  .social-row{
    display:flex;
    justify-content:center;
    gap: 22px;
    margin: 20px 0 44px;
  }

  .social-row .icon-btn{ width: 64px; height: 64px; border-radius: 18px; }
  .social-row .icon-btn svg{ width: 30px; height: 30px; }

  .viewcount{
    text-align:center;
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0 0 24px;
  }

  .footer-text{
    text-align:center;
    font-size: 0.98rem;
    line-height: 1.7;
    max-width: 520px;
    margin: 0 auto;
  }

  .footer-text a{ color: var(--ink); }

  .signup-card{
    border-radius: 22px;
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--card-shadow);
    padding: 32px 26px;
    margin-bottom: 44px;
    background: var(--card-cream);
    text-align: center;
  }

  .signup-card h2{
    font-size: 1.4rem;
    margin: 0 0 10px;
    letter-spacing: 1px;
  }

  .signup-card p{
    font-size: 0.95rem;
    line-height: 1.6;
    margin: 0 0 20px;
  }

  .signup-form{
    display:flex;
    gap: 10px;
    max-width: 380px;
    margin: 0 auto;
    flex-wrap: wrap;
    justify-content:center;
  }

  .signup-form input[type="email"]{
    flex: 1 1 200px;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 12px 14px;
    border: 3px solid var(--ink);
    border-radius: 12px;
    background: var(--icon-bg);
    color: var(--ink);
    outline: none;
  }

  .signup-form input[type="email"]:focus{
    box-shadow: 0 0 0 3px rgba(44,38,34,0.2);
  }

  .signup-form button{
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 12px 20px;
    border: 3px solid var(--ink);
    border-radius: 12px;
    background: var(--card-pink);
    color: var(--ink);
    box-shadow: 5px 5px 0 var(--card-shadow);
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .signup-form button:hover{ transform: translate(-2px,-2px); }
  .signup-form button:active{ transform: translate(1px,1px); box-shadow: 3px 3px 0 var(--card-shadow); }

  .signup-msg{
    margin-top: 14px;
    font-size: 0.9rem;
    min-height: 1.2em;
  }

  .signup-msg.success{ color: #1a7a4c; font-weight: 700; }
  .signup-msg.error{ color: #a33; font-weight: 700; }
  .signup-msg.demo{ color: #6b5c00; }

  @media (max-width: 480px){
    .brand{ font-size: 1.6rem; }
    .card{ padding: 26px 18px; }
  }
</style>
</head>
<body>

<div class="page" id="page">
  <p style="text-align:center;">Loading…</p>
</div>

<script>
  const ARROW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';

  const COFFEE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>';

  const EMAIL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>';

  const INSTAGRAM_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"/></svg>';

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderCard(card){
    const paragraphsHtml = card.paragraphs.map(p => {
      const lead = p.lead ? '<span class="lead">' + escapeHtml(p.lead) + '</span>' : '';
      return '<p>' + lead + escapeHtml(p.text || '') + '</p>';
    }).join('');

    const sponsoredTag = card.sponsored ? '<p class="sponsored-tag">Sponsored</p>' : '';

    return `
      <div class="card ${card.color || ''}" id="${card.id}">
        <h2>${escapeHtml(card.title)}</h2>
        ${sponsoredTag}
        ${paragraphsHtml}
        <a class="icon-btn" href="${card.link}" target="_blank" rel="noopener" aria-label="Visit ${escapeHtml(card.title)}">
          ${ARROW_SVG}
        </a>
      </div>`;
  }

  function renderPage(data){
    const page = document.getElementById('page');
    const cardsHtml = data.cards.map(renderCard).join('');

    page.innerHTML = `
      <div class="brand">${escapeHtml(data.site.brand)}</div>
      <p class="tagline">${escapeHtml(data.site.tagline)}</p>
      <p class="lineup-label">${escapeHtml(data.site.lineupLabel)}</p>

      ${cardsHtml}

      <div class="signup-card" id="signup-card">
        <h2>${escapeHtml(data.signup.heading)}</h2>
        <p>${escapeHtml(data.signup.description)}</p>
        <form class="signup-form" id="signup-form">
          <input type="email" id="signup-email" name="email" placeholder="your@email.com" required>
          <button type="submit">Subscribe</button>
        </form>
        <p class="signup-msg" id="signup-msg"></p>
      </div>

      <div class="social-row">
        <a class="icon-btn" href="${data.social.coffee}" target="_blank" rel="noopener" aria-label="Buy Me A Coffee">${COFFEE_SVG}</a>
        <a class="icon-btn" href="${data.social.email}" aria-label="Email">${EMAIL_SVG}</a>
        <a class="icon-btn" href="${data.social.instagram}" target="_blank" rel="noopener" aria-label="Instagram">${INSTAGRAM_SVG}</a>
      </div>

      <p class="viewcount">${escapeHtml(data.site.viewcount)}</p>

      <p class="footer-text">${escapeHtml(data.site.footerText)}</p>
    `;

    setupSignupForm(data.signup.buttondownUsername);
  }

  function setupSignupForm(buttondownUsername){
    const form = document.getElementById('signup-form');
    const emailInput = document.getElementById('signup-email');
    const msg = document.getElementById('signup-msg');

    function showMsg(text, type){
      msg.textContent = text;
      msg.className = 'signup-msg ' + type;
    }

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      const email = emailInput.value.trim();
      if(!email){ return; }

      // DEMO MODE: no real Buttondown username set yet, so we simulate success
      // locally. This lets you test the form/UI before wiring up the real account.
      if(!buttondownUsername || buttondownUsername === "YOUR_USERNAME"){
        showMsg("✓ (Demo) Would have subscribed: " + email + " — set buttondownUsername in data.json to go live.", "demo");
        form.reset();
        return;
      }

      // LIVE MODE: real submission to Buttondown once username is set
      try{
        showMsg("Submitting…", "demo");
        const resp = await fetch(
          "https://buttondown.com/api/emails/embed-subscribe/" + buttondownUsername,
          {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "email=" + encodeURIComponent(email) + "&embed=1"          }
        );
        if(resp.ok){
          showMsg("✓ You're subscribed! Check your inbox to confirm.", "success");
          form.reset();
        } else {
          showMsg("Something went wrong — try again in a minute.", "error");
        }
      } catch(err){
        showMsg("Couldn't reach the signup service. Try again shortly.", "error");
      }
    });
  }

  // ---- LOAD DATA ----
  fetch('data.json')
    .then(res => {
      if(!res.ok) throw new Error('Failed to load data.json');
      return res.json();
    })
    .then(renderPage)
    .catch(err => {
      document.getElementById('page').innerHTML =
        '<p style="text-align:center;">Couldn\'t load data.json — ' + escapeHtml(err.message) +
        '. If you\'re testing locally by double-clicking the file, run a local server instead (e.g. <code>python3 -m http.server</code>) since browsers block fetch() on file:// URLs.</p>';
      console.error(err);
    });
</script>

<!-- GoatCounter analytics -->
<script data-goatcounter="https://yoodrix.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
